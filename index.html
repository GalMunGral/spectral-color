<head>
  <meta charset="utf-8" />
  <title>Spectral Color</title>
  <link rel="stylesheet" href="main.css" />
</head>
<body>
  <div id="main">
    <div id="container">
      <h4>Method 1 — CIE Color Matching Function Integration</h4>
      <div id="absorbed"></div>
      <div id="perceivedIntegrated"></div>
      <h4>Method 2 — Piecewise Linear Interpolation in Color Space</h4>
      <div id="perceivedInterpolated"></div>
      <div id="plotContainer">
        <div class="lab">
          <svg></svg>
          <canvas></canvas>
        </div>
        <div class="lch">
          <svg></svg>
          <canvas></canvas>
        </div>
      </div>
    </div>
    <div id="controls">
      <h4>CIE Integration</h4>
      <h5>Absorption bandwidth (σ)</h5>
      <input
        id="sigmaControl"
        type="range"
        min="1"
        max="500"
        value="75"
        style="margin-right: 10px"
      />
      <h4>Interpolation</h4>
      <h5>Color Space</h5>
      <div id="colorSpaces"></div>
      <h5>Color Stops</h5>
      <div>
        <button id="addBtn">+</button><button id="removeBtn">-</button
        ><button id="presetBtn1">YRMBC</button
        ><button id="presetBtn2">YMC</button>
      </div>
      <div id="colorPickerGroup"></div>
      <h4>Plots</h4>
      <div>
        <input type="checkbox" id="checkbox1" oninput="render()" checked /><label>CIE Integration</label>
      </div>
      <div>
        <input type="checkbox" id="checkbox2" oninput="render()" checked /><label>Interpolation</label>
      </div>
      <h5>Lightness (L)</h5>
      <input
        id="lightnessControl"
        type="range"
        min="1"
        max="100"
        value="50"
        style="margin-right: 10px"
        oninput="render()"
      />
    </div>
    <template id="colorPickerTemplate">
      <div class="colorPicker">
        <input type="range" class="lambdaInput" min="380" max="700" />
        <span class="lambdaValue"></span>
        <input type="color" class="colorInput" />
      </div>
    </template>
    <svg width="0" height="0">
      <defs>
        <marker
          id="marker1"
          viewBox="0 0 1 2"
          refX="1"
          refY="1"
          markerWidth="4"
          markerHeight="4"
          orient="auto-start-reverse"
        >
          <path d="M 0 0 L 1 1 L 0 2 z" fill="gray"></path>
        </marker>
        <marker
          id="marker2"
          viewBox="0 0 1 2"
          refX="1"
          refY="1"
          markerWidth="4"
          markerHeight="4"
          orient="auto-start-reverse"
        >
          <path d="M 0 0 L 1 1 L 0 2 z" fill="white"></path>
        </marker>
      </defs>
    </svg>
  </div>
  <script type="module" src="main.js"></script>
</body>
